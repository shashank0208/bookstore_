<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Books</title>
    <style>
        body {
            background-color: #060505;
            color: #f7f4f4;
            font-family: Arial, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background-color: #f8f8f8;
        }
        .navbar a {
            text-decoration: none;
            color: #1b1a1a;
            font-size: 18px;
            padding: 10px;
        }
        .placeholder {
            text-align: center;
            margin-top: 80px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('books') }}">Books</a>
        <a href="{{ url_for('topseller') }}">Top Seller</a>
        <a href="{{ url_for('authors') }}">Authors</a>
        <a href="{{ url_for('genre') }}">Genre</a>
        <a href="{{ url_for('audiobooks') }}">Audio Books</a>
        {% if is_admin %}<a href="{{ url_for('addbooks') }}">Add Books</a>{% endif %}
        <a href="{{ url_for('view_cart') }}">Cart</a>
        {% if current_user %}
            <a href="{{ url_for('orders') }}">My Orders</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
        {% endif %}
    </div>

    <p class="placeholder">Audiobooks section coming soon.</p>
</body>
</html>
