<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
   
</head>
<style>
.navbar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background-color: #f5eded;
}

.navbar a {
    text-decoration: none;
    color: #0f0e0e;
    font-size: 18px;
    padding: 10px;
    transition: all 0.3s ease-in-out;
    position: relative;
}

.navbar a:hover {
    color: #0f0e0e;
    text-shadow: 0 0 5px #141313, 0 0 10px #101010, 0 0 15px #850585, 0 0 20px #a30da3;
}

.navbar a::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 0;
    width: 100%;
    height: 3px;
    background-color: #090909;
    transform: scaleY(0);
    transform-origin: bottom right;
    transition: transform 0.3s ease-out;
}

.navbar a:hover::after {
    transform: scaleY(1);
    transform-origin: bottom left;
}
.l-button{

    background-color: #141313;
    color: #f7f1f1;
    border-color: white;
    border-radius: 10px;
    border: 1px solid #f7f1f1;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
}
/* Explore More Button */
.dark-button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    background-color: black;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
    border-radius: 5px;
}

.dark-button:hover {
    background-color: white;
    color: black;
    border: 1px solid black;
}

/* Login/Signup Button */
.l-button {
    background-color: black;
    color: white;
    padding: 10px 16px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
    border-radius: 5px;
}

.l-button:hover {
    background-color: white;
    color: black;
    border: 1px solid black;
}

/* Optional: Remove underline on hover for login/signup link */
.l-button a {
    color: inherit;
    text-decoration: none;
}

.l-button:hover a {
    color: black;
}

</style>

<body>
    <body>
        <div class="navbar">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('books') }}">Books</a>
            <a href="{{ url_for('topseller') }}">Top Seller</a>
            <a href="{{ url_for('authors') }}">Authors</a>
            <a href="{{ url_for('genre') }}">Genre</a>
            <a href="{{ url_for('audiobooks') }}">Audio Books</a>
            <a href="{{ url_for('addbooks') }}">Add Books</a>
            <a href="{{ url_for('view_cart') }}">Cart</a>
            <button class="l-button"><a href="{{ url_for('login') }}">Login/Signup</a></button>
        </div>
    

    <div class="about">
    <p>this is home </p>
    <h1>ABOUT US</h1>
    <p>this is a website for you to expolore all kinds of books.For more options click on the explore button</p>
</div>
    <div class="button">
        <a href="{{url_for('books')}}">
        <button class="dark-button">Explore More &#8594 </button>
    </a>
    </div>
    
    
</body>
</html>
