<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tstyle.css') }}">

    <script>
        function sortBooks() {
            let sortOrder = document.getElementById("sort").value;
            if (sortOrder === "none") return;
    
            fetch(`/get_books?order=${sortOrder}`)
                .then(response => response.json())
                .then(data => {
                    let booksContainer = document.getElementById("books-container");
                    booksContainer.innerHTML = ""; // Clear previous books
    
                    data.forEach(book => {
                        let bookDiv = document.createElement("div");
                        bookDiv.classList.add("book");
    
                        bookDiv.innerHTML = `
    <img src="/static/${book.cover_image.replace('static/', '')}" alt="${book.title}">
    <div class="details">
        <h3>${book.title}</h3>
        <p>${book.author}</p>
        <p class="price">₹${book.price}</p>
        <button onclick="addToCart(${book.id}, '${book.title}', ${book.price})" style="margin-top:5px;">Add to Cart</button>
    </div>
`;
                        bookDiv.addEventListener("click", function() {
                            window.location.href = `/book_detail/${book.id}`;
                        });
                        bookDiv.style.cursor = "pointer"; // Change cursor to pointer
                        booksContainer.appendChild(bookDiv);
                    });
                })
                .catch(error => console.error("Error fetching sorted books:", error));
        }
    </script>
    <script>
        
    let cart = [];

    function addToCart(bookId, title, price) {
        const existing = cart.find(item => item.bookId === bookId);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ bookId, title, price, quantity: 1 });
        }

        alert(`${title} added to cart!`);
        console.log(cart);
        localStorage.setItem("cart", JSON.stringify(cart));
    }


    </script>
